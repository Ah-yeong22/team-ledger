<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>원장 — 팀 프로젝트 기록부</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#1B2A45;
  --ink-soft:#3D5273;
  --paper:#EFF2EE;
  --paper-raised:#FFFFFF;
  --rule:#D3D8CE;
  --rule-strong:#B7BEB0;
  --gold:#D9A441;
  --gold-deep:#A9791F;
  --teal:#2F8F76;
  --teal-soft:#E3EFE9;
  --red:#BD4B39;
  --red-soft:#F5E6E1;
  --muted:#727C6E;
  --shadow: 0 1px 2px rgba(27,42,69,.06), 0 8px 24px -12px rgba(27,42,69,.18);
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:var(--paper);
  color:var(--ink);
  font-family:'Pretendard', -apple-system, sans-serif;
  -webkit-font-smoothing:antialiased;
  min-height:100vh;
}
.mono{font-family:'IBM Plex Mono', monospace;}
.disp{font-family:'Fraunces', serif;}
::selection{background:var(--gold);color:var(--ink);}
a{color:inherit;}
button{font-family:inherit;cursor:pointer;}
input,select,textarea{font-family:inherit;}

/* ---------- scaffolding ---------- */
#root{min-height:100vh;}
.hairline{border:none;border-top:1px solid var(--rule);margin:0;}
.eyebrow{
  font-family:'IBM Plex Mono',monospace;
  font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);
}

/* ---------- login ---------- */
.login-wrap{
  min-height:100vh;display:flex;align-items:stretch;
}
.login-side{
  flex:1.1;background:var(--ink);color:#EDE7D8;
  padding:64px 56px;display:flex;flex-direction:column;justify-content:space-between;
  position:relative;overflow:hidden;
}
.login-side::after{
  content:"";position:absolute;right:-120px;bottom:-140px;width:420px;height:420px;
  border-radius:50%;border:1px solid rgba(237,231,216,.14);
}
.login-side::before{
  content:"";position:absolute;right:-40px;bottom:-60px;width:280px;height:280px;
  border-radius:50%;border:1px solid rgba(237,231,216,.12);
}
.login-mark{font-family:'Fraunces',serif;font-size:22px;letter-spacing:.02em;display:flex;align-items:center;gap:10px;}
.login-mark .dot{width:9px;height:9px;border-radius:50%;background:var(--gold);}
.login-headline{font-family:'Fraunces',serif;font-weight:600;font-size:44px;line-height:1.18;max-width:480px;z-index:1;}
.login-headline em{font-style:italic;color:var(--gold);}
.login-sub{font-size:14.5px;color:#C9C2AE;max-width:400px;line-height:1.7;z-index:1;}
.login-quote{font-family:'IBM Plex Mono',monospace;font-size:12px;color:#9AA9A2;z-index:1;letter-spacing:.02em;}

.login-form-side{
  flex:.9;background:var(--paper);padding:64px 56px;display:flex;align-items:center;justify-content:center;
}
.login-card{width:100%;max-width:400px;}
.login-card h2{font-family:'Fraunces',serif;font-size:26px;margin:0 0 6px;}
.login-card p.hint{color:var(--muted);font-size:13.5px;margin:0 0 28px;}
.role-toggle{display:flex;border:1px solid var(--rule-strong);border-radius:10px;overflow:hidden;margin-bottom:24px;}
.role-toggle button{flex:1;padding:11px 0;border:none;background:transparent;font-size:13.5px;font-weight:600;color:var(--muted);}
.role-toggle button.active{background:var(--ink);color:#F3EFE3;}
.acct-list{display:flex;flex-direction:column;gap:8px;margin-bottom:20px;max-height:300px;overflow:auto;}
.acct-item{
  display:flex;align-items:center;gap:12px;padding:12px 14px;border:1px solid var(--rule);
  border-radius:10px;background:var(--paper-raised);text-align:left;transition:.15s;
}
.acct-item:hover{border-color:var(--gold);box-shadow:var(--shadow);}
.acct-item.selected{border-color:var(--gold-deep);background:#FBF3E1;}
.acct-avatar{
  width:36px;height:36px;border-radius:50%;background:var(--ink);color:#F3EFE3;
  display:flex;align-items:center;justify-content:center;font-family:'Fraunces',serif;font-size:14px;flex-shrink:0;
}
.acct-name{font-weight:600;font-size:14px;}
.acct-meta{font-size:12px;color:var(--muted);font-family:'IBM Plex Mono',monospace;}
.btn-primary{
  width:100%;padding:13px 0;border:none;border-radius:10px;background:var(--ink);color:#F3EFE3;
  font-weight:600;font-size:14.5px;letter-spacing:.01em;transition:.15s;
}
.btn-primary:hover{background:var(--ink-soft);}
.btn-primary:disabled{opacity:.4;cursor:not-allowed;}

/* ---------- app shell ---------- */
.shell{display:flex;min-height:100vh;}
.sidebar{
  width:236px;flex-shrink:0;background:var(--ink);color:#EDE7D8;
  padding:28px 0;display:flex;flex-direction:column;position:sticky;top:0;height:100vh;
}
.side-brand{padding:0 24px 22px;display:flex;align-items:center;gap:9px;font-family:'Fraunces',serif;font-size:19px;}
.side-brand .dot{width:8px;height:8px;border-radius:50%;background:var(--gold);}
.side-user{padding:0 24px 20px;border-bottom:1px solid rgba(237,231,216,.14);margin-bottom:18px;}
.side-user .n{font-weight:600;font-size:14.5px;}
.side-user .r{font-size:11.5px;color:#B9B29A;font-family:'IBM Plex Mono',monospace;margin-top:2px;}
.side-nav{display:flex;flex-direction:column;gap:2px;padding:0 12px;flex:1;}
.side-tab{
  display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;border:none;background:transparent;
  color:#CFC9B6;font-size:13.5px;text-align:left;font-weight:500;
}
.side-tab .idx{font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:#8B9488;width:16px;}
.side-tab.active{background:rgba(217,164,65,.16);color:#F5EFDF;}
.side-tab:hover:not(.active){background:rgba(255,255,255,.05);}
.side-foot{padding:16px 24px 0;border-top:1px solid rgba(237,231,216,.14);margin-top:12px;}
.side-logout{background:none;border:none;color:#B9B29A;font-size:12.5px;font-family:'IBM Plex Mono',monospace;padding:0;}
.side-logout:hover{color:#F3EFE3;}

.main{flex:1;padding:40px 48px 80px;max-width:1180px;}
.page-head{margin-bottom:28px;}
.page-head .eyebrow{margin-bottom:8px;}
.page-head h1{font-family:'Fraunces',serif;font-size:30px;margin:0;font-weight:600;}
.page-head .desc{color:var(--muted);font-size:14px;margin-top:6px;max-width:640px;line-height:1.6;}

.class-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:28px;}
.class-tab{
  padding:9px 16px;border-radius:20px;border:1px solid var(--rule-strong);background:var(--paper-raised);
  font-size:13px;font-weight:600;color:var(--ink-soft);
}
.class-tab.active{background:var(--ink);color:#F3EFE3;border-color:var(--ink);}

/* ---------- ledger / cards ---------- */
.sheet{background:var(--paper-raised);border:1px solid var(--rule);border-radius:14px;box-shadow:var(--shadow);}
.sheet-pad{padding:24px 26px;}
.sheet-head{display:flex;align-items:center;justify-content:space-between;padding:18px 26px;border-bottom:1px solid var(--rule);}
.sheet-head h3{font-family:'Fraunces',serif;font-size:17px;margin:0;font-weight:600;}
.sheet-head .cnt{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--muted);}

.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}
@media(max-width:900px){.grid-2,.grid-3{grid-template-columns:1fr;}}

.stat-tile{padding:18px 20px;border:1px solid var(--rule);border-radius:12px;background:var(--paper-raised);}
.stat-tile .lbl{font-size:12px;color:var(--muted);font-family:'IBM Plex Mono',monospace;letter-spacing:.03em;}
.stat-tile .val{font-family:'Fraunces',serif;font-size:30px;margin-top:6px;font-weight:600;}
.stat-tile .sub{font-size:12px;color:var(--muted);margin-top:4px;}

.ledger-row{
  display:flex;align-items:center;gap:14px;padding:13px 26px;border-bottom:1px solid var(--rule);font-size:13.5px;
}
.ledger-row:last-child{border-bottom:none;}
.ledger-row:hover{background:#F7F8F4;}
.ledger-idx{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted);width:20px;flex-shrink:0;}
.ledger-tag{
  font-size:10.5px;font-family:'IBM Plex Mono',monospace;padding:3px 8px;border-radius:5px;font-weight:600;
  letter-spacing:.02em;flex-shrink:0;
}
.tag-github{background:#EAE7F5;color:#584B9A;}
.tag-ppt{background:#F5E6E1;color:#A85C3F;}
.tag-code{background:#E3EFE9;color:#2F8F76;}
.tag-design{background:#FBF0DC;color:#A9791F;}
.tag-meeting{background:#E4EBF3;color:#3D5273;}
.ledger-title{font-weight:600;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.ledger-meta{font-size:11.5px;color:var(--muted);font-family:'IBM Plex Mono',monospace;flex-shrink:0;}

/* buttons */
.btn{padding:9px 16px;border-radius:8px;border:1px solid var(--rule-strong);background:var(--paper-raised);
  font-size:13px;font-weight:600;color:var(--ink);}
.btn:hover{border-color:var(--ink);}
.btn-dark{background:var(--ink);color:#F3EFE3;border-color:var(--ink);}
.btn-dark:hover{background:var(--ink-soft);}
.btn-gold{background:var(--gold);color:#3A2A0A;border-color:var(--gold);}
.btn-gold:hover{background:var(--gold-deep);color:#fff;}
.btn-sm{padding:6px 12px;font-size:12px;border-radius:6px;}
.btn-block{width:100%;}
.btn:disabled{opacity:.45;cursor:not-allowed;}

/* badges */
.badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px;font-family:'IBM Plex Mono',monospace;}
.badge-teal{background:var(--teal-soft);color:var(--teal);}
.badge-red{background:var(--red-soft);color:var(--red);}
.badge-gold{background:#FBF0DC;color:var(--gold-deep);}
.badge-muted{background:#E7E9E3;color:var(--muted);}

/* progress bar */
.pbar{height:7px;background:#E5E8E0;border-radius:20px;overflow:hidden;}
.pbar > div{height:100%;background:var(--teal);border-radius:20px;}
.pbar.warn > div{background:var(--gold);}
.pbar.danger > div{background:var(--red);}

/* tally grid (contribution heatmap) */
.tally-grid{display:grid;grid-template-columns:repeat(12,1fr);gap:4px;max-width:340px;}
.tally-cell{width:100%;aspect-ratio:1;border-radius:3px;background:#E5E8E0;}
.tally-legend{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted);margin-top:8px;font-family:'IBM Plex Mono',monospace;}
.tally-legend .sq{width:10px;height:10px;border-radius:2px;}

/* bar chart */
.barchart{display:flex;align-items:flex-end;gap:10px;height:120px;padding-top:10px;}
.barchart .col{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;height:100%;justify-content:flex-end;}
.barchart .bar{width:100%;max-width:34px;border-radius:5px 5px 2px 2px;background:var(--ink-soft);}
.barchart .colname{font-size:10.5px;color:var(--muted);font-family:'IBM Plex Mono',monospace;text-align:center;}

/* member roster */
.member-row{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--rule);}
.member-row:last-child{border-bottom:none;}
.avatar{width:38px;height:38px;border-radius:50%;background:var(--ink);color:#F3EFE3;display:flex;align-items:center;
  justify-content:center;font-family:'Fraunces',serif;font-size:14px;flex-shrink:0;}
.member-name{font-weight:600;font-size:13.5px;}
.member-role{font-size:11.5px;color:var(--muted);}

/* forms */
.field{margin-bottom:16px;}
.field label{display:block;font-size:12.5px;font-weight:600;color:var(--ink-soft);margin-bottom:6px;}
.field input[type=text],.field input[type=date],.field input[type=url],.field select,.field textarea{
  width:100%;padding:10px 12px;border:1px solid var(--rule-strong);border-radius:8px;font-size:13.5px;background:var(--paper-raised);
  color:var(--ink);
}
.field textarea{resize:vertical;min-height:70px;}
.field input:focus,.field select:focus,.field textarea:focus{outline:2px solid var(--gold);outline-offset:0;border-color:var(--gold);}
.type-pick{display:flex;gap:8px;flex-wrap:wrap;}
.type-pick label{display:flex;align-items:center;gap:6px;padding:8px 12px;border:1px solid var(--rule-strong);border-radius:8px;font-size:12.5px;font-weight:600;cursor:pointer;}
.type-pick input{margin:0;}
.type-pick label:has(input:checked){border-color:var(--gold-deep);background:#FBF3E1;}

.range-field{margin-bottom:18px;}
.range-field .rf-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px;}
.range-field .rf-head .l{font-size:13px;font-weight:600;}
.range-field .rf-head .v{font-family:'IBM Plex Mono',monospace;font-size:13px;color:var(--gold-deep);font-weight:700;}
.range-field input[type=range]{width:100%;accent-color:var(--gold-deep);}

/* stamp */
.stamp-wrap{display:flex;align-items:center;justify-content:center;padding:20px;}
.stamp{
  width:120px;height:120px;border-radius:50%;border:3px solid var(--teal);color:var(--teal);
  display:flex;flex-direction:column;align-items:center;justify-content:center;transform:rotate(-9deg);
  font-family:'Fraunces',serif;font-weight:700;letter-spacing:.03em;
}
.stamp .t1{font-size:13px;}
.stamp .t2{font-size:19px;margin:2px 0;}
.stamp .t3{font-size:9px;font-family:'IBM Plex Mono',monospace;letter-spacing:.08em;}

.empty{padding:44px 26px;text-align:center;color:var(--muted);}
.empty .ic{font-size:26px;margin-bottom:10px;}
.empty p{font-size:13.5px;margin:0 0 14px;}

.tabbar{display:flex;gap:4px;margin-bottom:22px;border-bottom:1px solid var(--rule);}
.tabbar button{padding:11px 4px;margin-right:22px;border:none;background:none;font-size:13.5px;font-weight:600;color:var(--muted);
  border-bottom:2px solid transparent;position:relative;top:1px;}
.tabbar button.active{color:var(--ink);border-color:var(--gold-deep);}

.modal-bg{position:fixed;inset:0;background:rgba(27,42,69,.5);display:flex;align-items:center;justify-content:center;z-index:50;padding:20px;}
.modal{background:var(--paper-raised);border-radius:14px;max-width:460px;width:100%;max-height:88vh;overflow:auto;box-shadow:var(--shadow);}
.modal-head{padding:20px 24px;border-bottom:1px solid var(--rule);display:flex;align-items:center;justify-content:space-between;}
.modal-head h3{font-family:'Fraunces',serif;font-size:18px;margin:0;}
.modal-close{background:none;border:none;font-size:18px;color:var(--muted);padding:2px 6px;}
.modal-body{padding:22px 24px;}
.modal-foot{padding:16px 24px 22px;display:flex;gap:10px;}

.link-btn{background:none;border:none;color:var(--gold-deep);font-weight:600;font-size:13px;padding:0;text-decoration:underline;text-underline-offset:3px;}

.chip-row{display:flex;gap:6px;flex-wrap:wrap;}
.proj-card{border:1px solid var(--rule);border-radius:12px;padding:18px 20px;background:var(--paper-raised);}
.proj-card + .proj-card{margin-top:12px;}
.proj-card .ph{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;}
.proj-card h4{font-family:'Fraunces',serif;font-size:16px;margin:0;}
.proj-card .due{font-size:11.5px;color:var(--muted);font-family:'IBM Plex Mono',monospace;margin-top:2px;}

.eval-target{border:1px solid var(--rule);border-radius:12px;padding:18px 20px;margin-bottom:14px;background:var(--paper-raised);}
.eval-target-head{display:flex;align-items:center;gap:10px;margin-bottom:14px;}

.notice{display:flex;gap:10px;padding:12px 14px;border-radius:10px;background:#E4EBF3;color:var(--ink-soft);font-size:12.5px;line-height:1.6;margin-bottom:20px;}
.notice b{color:var(--ink);}

table.data-table{width:100%;border-collapse:collapse;font-size:13px;}
table.data-table th{text-align:left;font-size:11px;color:var(--muted);font-family:'IBM Plex Mono',monospace;font-weight:600;
  padding:0 26px 10px;text-transform:uppercase;letter-spacing:.04em;}
table.data-table td{padding:12px 26px;border-top:1px solid var(--rule);}
table.data-table tr:hover td{background:#F7F8F4;}
</style>
</head>

/* =========================================================================
   DERIVED HELPERS
========================================================================= */
function studentTeamsForProject(studentId, projectId){
  return DB.teams.filter(t=>t.projectId===projectId && t.memberIds.includes(studentId));
}
function studentTeamForProject(studentId, projectId){
  return studentTeamsForProject(studentId,projectId)[0] || null;
}
function classesForProfessor(profId){ return DB.classes.filter(c=>c.professorId===profId); }
function projectsForClass(classId){ return DB.projects.filter(p=>p.classId===classId); }
function teamsForProject(projectId){ return DB.teams.filter(t=>t.projectId===projectId); }
function uploadsForTeam(teamId){ return DB.uploads.filter(u=>u.teamId===teamId).sort((a,b)=>b.date.localeCompare(a.date)); }
function uploadsForStudentInTeam(teamId, studentId){ return DB.uploads.filter(u=>u.teamId===teamId && u.studentId===studentId); }
function meetingsForTeam(teamId){ return DB.meetings.filter(m=>m.teamId===teamId); }
function attendanceRate(teamId, studentId){
  const ms = meetingsForTeam(teamId);
  if(ms.length===0) return 1;
  const attended = ms.filter(m=>m.attendees.includes(studentId)).length;
  return attended/ms.length;
}
function checkpointCompliance(team){
  const proj = byId(DB.projects, team.projectId);
  if(!proj || proj.checkpoints.length===0) return {rate:1,met:0,total:0};
  let met=0;
  proj.checkpoints.forEach(cp=>{
    const has = DB.uploads.some(u=>u.teamId===team.id && u.date<=cp.due);
    if(has) met++;
  });
  return {rate: met/proj.checkpoints.length, met, total: proj.checkpoints.length};
}
function studentContribution(teamId, studentId){
  const team = byId(DB.teams, teamId);
  const uploads = uploadsForStudentInTeam(teamId, studentId);
  const allTeamUploads = uploadsForTeam(teamId);
  const totalUploads = allTeamUploads.length || 1;
  const uploadShare = uploads.length/totalUploads;
  const att = attendanceRate(teamId, studentId);
  const cp = checkpointCompliance(team);
  const evals = DB.evaluations.filter(e=>e.teamId===teamId && e.targetId===studentId);
  const avgEval = evals.length ? evals.reduce((s,e)=>s+e.collab+e.contrib+e.comm,0)/(evals.length*3) : null;
  const score = Math.round( (uploadShare*100)*0.4 + (att*100)*0.3 + (cp.rate*100)*0.3 );
  return {uploadCount:uploads.length, uploadShare, attendanceRate:att, complianceRate:cp.rate, avgEval, score};
}
function teamProgress(team){
  const cp = checkpointCompliance(team);
  return cp.rate;
}
function weeklyBuckets(uploads){
  // bucket by week label for last ~8 weeks range present in data
  const byWeek = {};
  uploads.forEach(u=>{
    const d = new Date(u.date);
    const week = Math.ceil(d.getDate()/7);
    const key = u.date.slice(0,7)+'-w'+week;
    byWeek[key]=(byWeek[key]||0)+1;
  });
  return byWeek;
}

      <div class="stat-tile"><div class="lbl">MEETINGS</div><div class="val">${meetingsForTeam(team.id).length}</div><div class="sub">기록된 회의 수</div></div>
    </div>
    <div class="sheet"><div class="sheet-head"><h3>팀원별 기여도</h3><span class="cnt">업로드 · 회의참여 · 마감준수 가중 평균</span></div>
      <div class="sheet-pad">
      ${members.map(m=>{
        const s = studentContribution(team.id, m.id);
        const uploads = uploadsForStudentInTeam(team.id, m.id);
        const buckets = weeklyBuckets(uploads);
        const bucketVals = Object.values(buckets);
        const max = Math.max(1,...bucketVals);
        return `
        <div style="padding:16px 0;border-bottom:1px solid var(--rule);">
          <div style="display:flex;align-items:center;gap:12px;margin-bottom:10px;">
            <div class="avatar">${initials(m.name)}</div>
            <div style="flex:1;">
              <div class="member-name">${m.name} <span style="color:var(--muted);font-weight:400;font-size:11.5px;">${team.roles[m.id]||''}</span></div>
              <div class="pbar" style="margin-top:6px;"><div style="width:${s.score}%"></div></div>
            </div>
            <div style="text-align:right;">
              <div class="disp" style="font-size:22px;">${s.score}</div>
              <div class="eyebrow">점수</div>
            </div>
          </div>
          <div style="display:flex;gap:22px;flex-wrap:wrap;font-size:12px;color:var(--muted);margin-left:50px;">
            <span>업로드 <b class="mono" style="color:var(--ink);">${s.uploadCount}건</b></span>
            <span>회의참여 <b class="mono" style="color:var(--ink);">${Math.round(s.attendanceRate*100)}%</b></span>
            <span>마감준수 <b class="mono" style="color:var(--ink);">${Math.round(s.complianceRate*100)}%</b></span>
            ${s.avgEval!==null?`<span>동료평가 <b class="mono" style="color:var(--ink);">${s.avgEval.toFixed(1)}/5</b></span>`:''}
          </div>
        </div>`;
      }).join('')}
      </div>
    </div>
  `;
}

function renderTeamPeerEval(team, proj){
  const others = usersById(team.memberIds.filter(id=>id!==state.currentUser.id));
  return `
    <div class="notice">동료 평가는 <b>협업 태도 · 기여도 · 소통</b> 3개 항목을 5점 척도로 남깁니다. 제출한 평가는 팀원에게 개별 공개되지 않고, 교수 대시보드에 집계되어 반영됩니다.</div>
    ${others.map(m=>{
      const existing = DB.evaluations.find(e=>e.projectId===proj.id&&e.teamId===team.id&&e.evaluatorId===state.currentUser.id&&e.targetId===m.id);
      if(existing){
        return `
        <div class="eval-target">
          <div class="eval-target-head">
            <div class="avatar">${initials(m.name)}</div>
            <div><div class="member-name">${m.name}</div><div class="member-role">${team.roles[m.id]||''}</div></div>
          </div>
          <div class="stamp-wrap" style="padding:6px 0 4px;">
            <div class="stamp"><div class="t1">EVALUATED</div><div class="t2">평가완료</div><div class="t3">협 ${existing.collab} · 기 ${existing.contrib} · 소 ${existing.comm}</div></div>
          </div>
        </div>`;
      }
      return `
      <div class="eval-target">
        <div class="eval-target-head">
          <div class="avatar">${initials(m.name)}</div>
          <div><div class="member-name">${m.name}</div><div class="member-role">${team.roles[m.id]||''}</div></div>
        </div>
        <form onsubmit="submitPeerEval(event,'${proj.id}','${team.id}','${m.id}')">
          ${rangeField('collab','협업 태도')}
          ${rangeField('contrib','기여도')}
          ${rangeField('comm','소통')}
          <div class="field"><label>코멘트 (선택)</label><textarea name="comment" placeholder="함께 작업하며 느낀 점을 남겨주세요."></textarea></div>
          <button class="btn btn-dark" type="submit">평가 제출</button>
        </form>
      </div>`;
    }).join('') || `<div class="empty"><p>팀원이 더 없어요.</p></div>`}
  `;
}
function rangeField(name,label){
  return `
  <div class="range-field">
    <div class="rf-head"><span class="l">${label}</span><span class="v" id="${name}Val">3</span></div>
    <input type="range" min="1" max="5" step="1" value="3" name="${name}" oninput="document.getElementById('${name}Val').textContent=this.value">
  </div>`;
}
function submitPeerEval(ev, projectId, teamId, targetId){
  ev.preventDefault();
  const f = new FormData(ev.target);
  DB.evaluations.push({id:uid('e'), projectId, teamId, evaluatorId:state.currentUser.id, targetId,
    collab:+f.get('collab'), contrib:+f.get('contrib'), comm:+f.get('comm'), comment:f.get('comment')||''});
  render();
}

/* =========================================================================
   STUDENT: MY CONTRIBUTION OVERVIEW (all projects)
========================================================================= */

      <h1>내 기여도 기록</h1>
      <div class="desc">참여 중인 모든 팀 프로젝트의 업로드·회의참여·마감준수 기록입니다.</div>
    </div>
    ${myTeams.map(team=>{
      const proj = byId(DB.projects, team.projectId);
      const cls = byId(DB.classes, proj.classId);

      return `
      <div class="sheet" style="margin-bottom:16px;">
        <div class="sheet-head">

          <span class="cnt">${proj.name}</span>

        <div class="sheet-pad">
          <div style="display:flex;align-items:center;gap:18px;">
            <div class="disp" style="font-size:38px;">${s.score}</div>
            <div style="flex:1;">
              <div class="pbar"><div style="width:${s.score}%"></div></div>
              <div style="display:flex;gap:18px;flex-wrap:wrap;font-size:12px;color:var(--muted);margin-top:10px;">
                <span>업로드 <b class="mono" style="color:var(--ink);">${s.uploadCount}건</b></span>
                <span>회의참여 <b class="mono" style="color:var(--ink);">${Math.round(s.attendanceRate*100)}%</b></span>

/* =========================================================================
   PROFESSOR: HOME
========================================================================= */
function renderProfHome(){
  const u = state.currentUser;
  const classes = classesForProfessor(u.id);
  if(!state.activeClassId) state.activeClassId = classes[0]?.id;
  const cls = byId(DB.classes, state.activeClassId);
  const projs = projectsForClass(cls.id);
  if(!state.activeProjectId || !projs.find(p=>p.id===state.activeProjectId)) state.activeProjectId = projs[0]?.id;
  const proj = byId(DB.projects, state.activeProjectId);
  const teams = teamsForProject(proj.id);
  const allStudentIds = [...new Set(teams.flatMap(t=>t.memberIds))];
  const totalUploads = teams.reduce((s,t)=>s+uploadsForTeam(t.id).length,0);
  const avgProgress = teams.length? Math.round(teams.reduce((s,t)=>s+teamProgress(t),0)/teams.length*100) : 0;
  const totalEvals = DB.evaluations.filter(e=>e.projectId===proj.id).length;

  return `
    <div class="page-head">
      <div class="eyebrow">PROFESSOR DASHBOARD</div>
      <h1>수업 대시보드</h1>
      <div class="desc">담당 수업을 선택하면 프로젝트별 팀 진행률, 개인 기여도, 업로드 내역, 평가 결과를 확인할 수 있어요.</div>
    </div>
    <div class="class-tabs">
      ${classes.map(c=>`<button class="class-tab ${c.id===state.activeClassId?'active':''}" onclick="setProfClass('${c.id}')">${c.name}</button>`).join('')}
    </div>
    <div class="tabbar">
      ${projs.map(p=>`<button class="${p.id===state.activeProjectId?'active':''}" onclick="setProfProject('${p.id}')">${p.name}</button>`).join('')}
    </div>

    <div class="grid-3" style="margin-bottom:22px;">
      <div class="stat-tile"><div class="lbl">TEAMS</div><div class="val">${teams.length}</div><div class="sub">이 프로젝트의 팀 수</div></div>
      <div class="stat-tile"><div class="lbl">AVG PROGRESS</div><div class="val">${avgProgress}%</div><div class="sub">평균 체크포인트 달성률</div></div>
      <div class="stat-tile"><div class="lbl">EVALUATIONS</div><div class="val">${totalEvals}</div><div class="sub">제출된 동료평가 · 학생 ${allStudentIds.length}명</div></div>
    </div>

    <div class="sheet" style="margin-bottom:22px;">
      <div class="sheet-head"><h3>팀별 진행 현황</h3><span class="cnt">${teams.length}개 팀</span></div>
      ${teams.map((t,i)=>{
        const cp = checkpointCompliance(t);
        const cls_ = 'rate' in cp && cp.rate<0.5 ? 'danger' : cp.rate<0.8?'warn':'';
        return `
        <div class="ledger-row" style="cursor:pointer;" onclick="openProfTeam('${t.id}')">
          <span class="ledger-idx">${String(i+1).padStart(2,'0')}</span>
          <span class="ledger-title">${t.name} <span style="color:var(--muted);font-weight:400;">· ${t.memberIds.length}명</span></span>
          <div class="pbar ${cls_}" style="width:160px;"><div style="width:${Math.round(cp.rate*100)}%"></div></div>
          <span class="ledger-meta">${cp.met}/${cp.total} 체크포인트</span>
          <span class="link-btn">상세 →</span>
        </div>`;
      }).join('') || `<div class="empty"><p>아직 생성된 팀이 없어요.</p></div>`}
    </div>

    <div class="sheet">
      <div class="sheet-head"><h3>전체 업로드 내역</h3><span class="cnt">최근순 · 총 ${totalUploads}건</span></div>
      ${teams.flatMap(t=>uploadsForTeam(t.id).map(u=>({...u,teamName:t.name})))
        .sort((a,b)=>b.date.localeCompare(a.date)).slice(0,10)
        .map((u,i)=>{
          const m = byId(DB.users,u.studentId);
          return `
          <div class="ledger-row">
            <span class="ledger-idx">${String(i+1).padStart(2,'0')}</span>
            <span class="ledger-tag ${TYPE_TAGCLASS[u.type]}">${TYPE_LABEL[u.type]}</span>
            <span class="ledger-title">${u.title}</span>
            <span class="ledger-meta">${u.teamName} · ${m.name}</span>
            <span class="ledger-meta">${u.date}</span>
          </div>`;
        }).join('') || `<div class="empty"><p>업로드 기록이 없어요.</p></div>`}
    </div>
  `;
}
function setProfClass(id){ state.activeClassId=id; state.activeProjectId=null; render(); }
function setProfProject(id){ state.activeProjectId=id; render(); }
function openProfTeam(teamId){ go('profTeamDetail', {activeTeamId:teamId}); }

/* =========================================================================
   PROFESSOR: TEAM DETAIL
========================================================================= */
function renderProfTeamDetail(){
  const team = byId(DB.teams, state.activeTeamId);
  const proj = byId(DB.projects, team.projectId);
  const cls = byId(DB.classes, proj.classId);
  const members = usersById(team.memberIds);
  const cp = checkpointCompliance(team);
  const uploads = uploadsForTeam(team.id);

  return `
    <div class="page-head">
      <div class="eyebrow">${cls.name} · ${proj.name}</div>
      <h1>${team.name}</h1>
      <div class="desc">체크포인트 ${cp.met}/${cp.total} 달성 · 업로드 ${uploads.length}건 · 회의 ${meetingsForTeam(team.id).length}회 기록</div>
    </div>

    <div class="grid-2" style="margin-bottom:22px;">
      <div class="sheet">
        <div class="sheet-head"><h3>체크포인트 진행</h3></div>
        <div class="sheet-pad">
          ${proj.checkpoints.map(c=>{
            const met = DB.uploads.some(u=>u.teamId===team.id && u.date<=c.due);
            return `
            <div style="display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--rule);">
              <span class="badge ${met?'badge-teal':'badge-red'}">${met?'완료':'미완료'}</span>
              <span style="flex:1;font-size:13.5px;font-weight:600;">${c.label}</span>
              <span class="mono" style="font-size:11.5px;color:var(--muted);">~${c.due}</span>
            </div>`;
          }).join('')}
        </div>
      </div>
      <div class="sheet">
        <div class="sheet-head"><h3>업로드 유형 분포</h3></div>
        <div class="sheet-pad">
          <div class="barchart">
          ${Object.keys(TYPE_LABEL).map(k=>{
            const cnt = uploads.filter(u=>u.type===k).length;
            const max = Math.max(1,...Object.keys(TYPE_LABEL).map(kk=>uploads.filter(u=>u.type===kk).length));
            return `<div class="col"><div class="bar" style="height:${Math.max(4,cnt/max*100)}%;background:${barColor(k)}"></div><div class="colname">${TYPE_LABEL[k]}<br>${cnt}</div></div>`;
          }).join('')}
          </div>
        </div>
      </div>
    </div>

    <div class="sheet" style="margin-bottom:22px;">
      <div class="sheet-head"><h3>개인 기여도</h3><span class="cnt">${members.length}명</span></div>
      <table class="data-table">
        <thead><tr><th>이름</th><th>역할</th><th>업로드</th><th>회의참여</th><th>마감준수</th><th>동료평가</th><th>종합점수</th></tr></thead>
        <tbody>
        ${members.map(m=>{
          const s = studentContribution(team.id, m.id);
          return `<tr>
            <td style="font-weight:600;">${m.name}</td>
            <td style="color:var(--muted);">${team.roles[m.id]||''}</td>
            <td class="mono">${s.uploadCount}건</td>
            <td class="mono">${Math.round(s.attendanceRate*100)}%</td>
            <td class="mono">${Math.round(s.complianceRate*100)}%</td>
            <td class="mono">${s.avgEval!==null? s.avgEval.toFixed(1)+'/5':'—'}</td>
            <td><span class="badge badge-gold">${s.score}점</span></td>
          </tr>`;
        }).join('')}
        </tbody>
      </table>
    </div>

    <div class="sheet" style="margin-bottom:22px;">
      <div class="sheet-head"><h3>동료 평가 결과</h3><span class="cnt">익명 집계</span></div>
      <div class="sheet-pad">
      ${members.map(m=>{
        const evals = DB.evaluations.filter(e=>e.teamId===team.id&&e.targetId===m.id);
        if(evals.length===0) return `<div style="padding:10px 0;border-bottom:1px solid var(--rule);"><b>${m.name}</b> <span style="color:var(--muted);font-size:12.5px;">— 아직 받은 평가 없음</span></div>`;
        const avg = k=> (evals.reduce((s,e)=>s+e[k],0)/evals.length).toFixed(1);
        return `
        <div style="padding:14px 0;border-bottom:1px solid var(--rule);">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
            <b>${m.name}</b>
            <span style="font-size:12px;color:var(--muted);">응답 ${evals.length}건</span>
          </div>
          <div style="display:flex;gap:16px;margin-bottom:8px;">
            <span class="badge badge-teal">협업 ${avg('collab')}</span>
            <span class="badge badge-teal">기여도 ${avg('contrib')}</span>
            <span class="badge badge-teal">소통 ${avg('comm')}</span>
          </div>
          ${evals.filter(e=>e.comment).map(e=>`<div style="font-size:12.5px;color:var(--ink-soft);padding:6px 10px;background:#F7F8F4;border-radius:8px;margin-top:4px;">“${e.comment}”</div>`).join('')}
        </div>`;
      }).join('')}
      </div>
    </div>

    <div class="sheet">
      <div class="sheet-head"><h3>업로드 내역</h3><span class="cnt">${uploads.length}건</span></div>
      ${uploads.map((u,i)=>{
        const m = byId(DB.users,u.studentId);
        return `
        <div class="ledger-row">
          <span class="ledger-idx">${String(i+1).padStart(2,'0')}</span>
          <span class="ledger-tag ${TYPE_TAGCLASS[u.type]}">${TYPE_LABEL[u.type]}</span>
          <span class="ledger-title">${u.title}</span>
          <span class="ledger-meta">${m.name}</span>
          <span class="ledger-meta">${u.date}</span>
        </div>`;
      }).join('') || `<div class="empty"><p>업로드 기록이 없어요.</p></div>`}
    </div>

    <div style="margin-top:26px;"><button class="link-btn" onclick="go('profHome')">← 대시보드로 돌아가기</button></div>
  `;
}
function barColor(k){
  return {github:'#584B9A',ppt:'#A85C3F',code:'#2F8F76',design:'#A9791F',meeting:'#3D5273'}[k];
}

/* =========================================================================
   MODAL
========================================================================= */
function openModal(type, arg){ state.modal={type,arg}; render(); }
function closeModal(){ state.modal=null; render(); }
function renderModal(){
  if(!state.modal) return '';
  let inner='';
  if(state.modal.type==='createTeam') inner = modalCreateTeam(state.modal.arg);
  else if(state.modal.type==='joinTeam') inner = modalJoinTeam(state.modal.arg);
  else if(state.modal.type==='addUpload') inner = modalAddUpload(state.modal.arg);
  return `<div class="modal-bg" onclick="if(event.target===this)closeModal()"><div class="modal">${inner}</div></div>`;
}

/* =========================================================================
   ROOT RENDER
========================================================================= */
function render(){
  const root = document.getElementById('root');
  if(!state.currentUser){
    root.innerHTML = renderLogin();
    return;
  }
  let inner;
  if(state.view==='studentHome') inner = renderStudentHome();
  else if(state.view==='studentContrib') inner = renderStudentContrib();
  else if(state.view==='teamWorkspace') inner = renderTeamWorkspace();
  else if(state.view==='profHome') inner = renderProfHome();
  else if(state.view==='profTeamDetail') inner = renderProfTeamDetail();
  else inner = renderStudentHome();
  root.innerHTML = renderShell(inner) + renderModal();
}

render();
</script>
