<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>원장 · 팀 프로젝트 관리</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=IBM+Plex+Mono:wght@400;500;600&family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root{--ink:#1B2A45;--ink2:#314666;--paper:#EFF2EE;--white:#fff;--rule:#d7ddd2;--gold:#d9a441;--teal:#2f8f76;--red:#bd4b39;--muted:#687463;--soft:#f7f8f5}
    *{box-sizing:border-box} body{margin:0;background:var(--paper);color:var(--ink);font-family:'Noto Sans KR',sans-serif}.hidden{display:none!important}
    button,input,select,textarea{font:inherit}button{cursor:pointer}.mono{font-family:'IBM Plex Mono',monospace}.disp{font-family:Fraunces,serif}.muted{color:var(--muted)}
    .auth{min-height:100vh;display:grid;grid-template-columns:1.05fr .95fr}.auth-hero{background:var(--ink);color:#f6f0df;padding:64px;display:flex;flex-direction:column;justify-content:space-between}.brand{font:600 23px Fraunces,serif;letter-spacing:.02em}.brand i{display:inline-block;width:9px;height:9px;border-radius:50%;background:var(--gold);margin-right:10px}.hero-title{font:600 48px/1.18 Fraunces,serif;max-width:520px}.hero-title em{color:var(--gold)}.hero-copy{max-width:480px;color:#c9c2ae;line-height:1.7;font-size:14px}.auth-pane{display:flex;align-items:center;justify-content:center;padding:40px}.auth-card{width:min(430px,100%)}.auth-card h1{font:600 29px Fraunces,serif;margin:0 0 8px}.auth-card>p{margin:0 0 25px;color:var(--muted);font-size:14px}
    .tabs{display:flex;gap:4px;border-bottom:1px solid var(--rule);margin-bottom:20px}.tabs button{padding:10px 5px;margin-right:20px;border:0;background:transparent;color:var(--muted);font-weight:700;border-bottom:2px solid transparent}.tabs button.active{color:var(--ink);border-color:var(--gold)}
    .field{margin:0 0 14px}.field label{display:block;margin-bottom:6px;font-size:12px;font-weight:700;color:var(--ink2)}.field input,.field textarea,.field select{width:100%;border:1px solid #bfc8ba;border-radius:8px;background:var(--white);padding:10px 12px;color:var(--ink)}.field textarea{min-height:80px;resize:vertical}.field input:focus,.field select:focus,.field textarea:focus{outline:2px solid #f0d397;border-color:var(--gold)}
    .row{display:flex;gap:10px}.row>*{flex:1}.btn{border:1px solid #b8c1b5;border-radius:8px;background:var(--white);color:var(--ink);padding:9px 14px;font-weight:700}.btn:hover{border-color:var(--ink)}.btn.dark{background:var(--ink);color:#fff;border-color:var(--ink)}.btn.gold{background:var(--gold);border-color:var(--gold);color:#352603}.btn.full{width:100%}.btn.sm{padding:6px 10px;font-size:12px}.btn.danger{border-color:#e6b8b0;color:var(--red)}.notice{font-size:12px;line-height:1.6;background:#e5edf4;padding:12px;border-radius:9px;color:#344a6c;margin:12px 0}.error{background:#f8e6e3;color:#8e3325}.success{background:#e5f1eb;color:#176b57}
    .shell{display:flex;min-height:100vh}.side{width:245px;background:var(--ink);color:#ede7d8;padding:26px 12px;display:flex;flex-direction:column;position:sticky;top:0;height:100vh}.side .brand{padding:0 12px 22px}.side-user{padding:16px 12px;border-top:1px solid rgba(255,255,255,.15);border-bottom:1px solid rgba(255,255,255,.15);margin-bottom:16px}.side-user b{font-size:14px}.side-user small{display:block;margin-top:4px;color:#b9c1b7}.nav{display:grid;gap:4px}.nav button{border:0;background:transparent;text-align:left;color:#cbd2c8;padding:10px 12px;border-radius:7px;font-size:13px}.nav button.active,.nav button:hover{background:rgba(217,164,65,.16);color:#fff}.side-bottom{margin-top:auto;padding:12px}.side-bottom button{border:0;background:transparent;color:#cbd2c8;padding:7px 0}.main{flex:1;max-width:1260px;padding:40px 48px 80px}.eyebrow{font:11px 'IBM Plex Mono',monospace;letter-spacing:.11em;color:var(--muted)}.page-title{font:600 31px Fraunces,serif;margin:6px 0}.page-desc{color:var(--muted);font-size:14px;line-height:1.65;max-width:720px}.top-actions{display:flex;gap:8px;flex-wrap:wrap;margin:23px 0}.card{background:var(--white);border:1px solid var(--rule);border-radius:13px;box-shadow:0 6px 18px -16px rgba(20,34,50,.35)}.card-head{display:flex;justify-content:space-between;align-items:center;padding:17px 20px;border-bottom:1px solid var(--rule)}.card-head h3{font:600 17px Fraunces,serif;margin:0}.card-pad{padding:20px}.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:15px}.grid2{display:grid;grid-template-columns:repeat(2,1fr);gap:18px}.stat{padding:18px}.stat .label{font:11px 'IBM Plex Mono',monospace;color:var(--muted)}.stat .value{font:600 31px Fraunces,serif;margin-top:5px}.stat .sub{font-size:12px;color:var(--muted);margin-top:3px}.listrow{display:flex;align-items:center;gap:12px;padding:13px 20px;border-bottom:1px solid var(--rule)}.listrow:last-child{border-bottom:0}.listrow:hover{background:var(--soft)}.grow{flex:1;min-width:0}.listtitle{font-size:14px;font-weight:700}.listsub{font:11.5px 'IBM Plex Mono',monospace;color:var(--muted);margin-top:3px}.badge{display:inline-flex;align-items:center;border-radius:20px;padding:3px 8px;font:11px 'IBM Plex Mono',monospace;font-weight:600}.badge.todo{background:#e7e9e3;color:#606b5d}.badge.doing{background:#fbf0dc;color:#9c6a10}.badge.done{background:#e3efe9;color:#19715c}.badge.high{background:#f6e4e1;color:#9e3d2f}.badge.medium{background:#fbf0dc;color:#9c6a10}.badge.low{background:#e4ebf3;color:#426083}.empty{padding:38px 20px;text-align:center;color:var(--muted);font-size:13px}.progress{height:7px;border-radius:12px;background:#e5e8e0;overflow:hidden}.progress>i{display:block;height:100%;background:var(--teal)}
    .board{display:grid;grid-template-columns:repeat(3,minmax(210px,1fr));gap:14px;align-items:start}.column{background:#e8ece5;border:1px solid var(--rule);border-radius:11px;min-height:280px;padding:11px}.column-head{display:flex;justify-content:space-between;align-items:center;padding:4px 4px 10px;font-size:13px;font-weight:700}.task{background:#fff;border:1px solid var(--rule);border-radius:8px;padding:12px;margin-bottom:8px}.task-title{font-size:13.5px;font-weight:700;line-height:1.45}.task-meta{display:flex;gap:5px;flex-wrap:wrap;margin-top:10px}.task-foot{font-size:11px;color:var(--muted);margin-top:8px;display:flex;justify-content:space-between}.task-actions{display:flex;gap:4px;margin-top:9px}.task-actions button{padding:4px 7px;font-size:11px;border-radius:6px}.modal-bg{position:fixed;inset:0;background:rgba(27,42,69,.5);display:flex;align-items:center;justify-content:center;padding:20px;z-index:5}.modal{width:min(510px,100%);max-height:90vh;overflow:auto;background:#fff;border-radius:14px;box-shadow:0 15px 40px rgba(0,0,0,.23)}.modal-head{display:flex;justify-content:space-between;align-items:center;padding:18px 20px;border-bottom:1px solid var(--rule)}.modal-head h3{font:600 18px Fraunces,serif;margin:0}.modal-body{padding:20px}.modal-foot{display:flex;gap:9px;padding:0 20px 20px}.modal-head button{border:0;background:transparent;font-size:20px;color:var(--muted)}.avatar{width:32px;height:32px;border-radius:50%;background:var(--ink);display:grid;place-items:center;color:#fff;font:13px Fraunces,serif;flex:0 0 auto}
    @media(max-width:850px){.auth{grid-template-columns:1fr}.auth-hero{display:none}.side{width:70px;padding:20px 8px}.side .brand,.side-user small,.side-user b,.nav .nav-text{display:none}.side-user{padding:6px;text-align:center}.nav button{text-align:center}.main{padding:28px 18px}.grid3,.grid2{grid-template-columns:1fr}.board{grid-template-columns:1fr}.row{flex-direction:column}.top-actions{margin-bottom:18px}}
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="./config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
  const { createClient } = supabase;
  const cfg = window.APP_CONFIG || {};
  let sb = null;
  let state = { session:null, profile:null, view:'home', modal:null, courses:[], projects:[], teams:[], members:[], tasks:[], activeTeamId:null };

  const e = (v='') => String(v).replace(/[&<>'"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));
  const initials = n => (n || '?').trim().slice(-2);
  const dateText = d => d ? d.replaceAll('-','.') : '기한 없음';
  const byId = (arr,id) => arr.find(x=>x.id===id);
  const activeTeam = () => byId(state.teams,state.activeTeamId);
  const isConfigured = () => cfg.SUPABASE_URL && cfg.SUPABASE_ANON_KEY && !cfg.SUPABASE_URL.includes('YOUR_');

  function flash(message,type='success'){ const el=document.getElementById('flash'); if(!el) return; el.textContent=message; el.className='notice '+type; el.classList.remove('hidden'); clearTimeout(window.__flash); window.__flash=setTimeout(()=>el.classList.add('hidden'),4500); }
  function setModal(type, data={}){ state.modal={type,...data}; render(); }
  function closeModal(){state.modal=null;render();}

  function renderAuth(){
    root.innerHTML=`<div class="auth"><section class="auth-hero"><div class="brand"><i></i>원장 LEDGER</div><div><div class="hero-title">팀의 계획과<br><em>실행</em>을 남기세요.</div><p class="hero-copy">학생은 팀 작업을 계획하고 진행 상태를 공유합니다. 교수는 담당 수업과 팀별 실행 현황을 확인합니다.</p></div><div class="eyebrow" style="color:#aab6a8">PROJECT MANAGEMENT · AUTHENTICATED</div></section><main class="auth-pane"><div class="auth-card"><h1>로그인</h1><p>학교 이메일로 계정을 만들고 역할에 맞는 작업공간을 이용하세요.</p><div class="tabs"><button class="active" data-auth-tab="signin">로그인</button><button data-auth-tab="signup">회원가입</button></div><div id="flash" class="notice hidden"></div><form id="signinForm"><div class="field"><label>이메일</label><input type="email" name="email" autocomplete="email" required placeholder="name@university.ac.kr"></div><div class="field"><label>비밀번호</label><input type="password" name="password" autocomplete="current-password" minlength="8" required></div><button class="btn dark full" type="submit">로그인</button></form><form id="signupForm" class="hidden"><div class="field"><label>이름</label><input name="name" required maxlength="40" placeholder="실명 또는 표시 이름"></div><div class="field"><label>이메일</label><input type="email" name="email" required placeholder="name@university.ac.kr"></div><div class="field"><label>비밀번호</label><input type="password" name="password" minlength="8" required placeholder="8자 이상"></div><div class="field"><label>계정 역할</label><select name="role"><option value="student">학생</option><option value="professor">교수</option></select></div><div class="notice">교수 계정은 관리자가 사전에 허용한 이메일만 교수 권한으로 생성됩니다. 허용되지 않은 이메일은 학생 계정으로 생성됩니다.</div><button class="btn gold full" type="submit">계정 만들기</button></form></div></main></div>`;
    document.querySelectorAll('[data-auth-tab]').forEach(btn=>btn.onclick=()=>{document.querySelectorAll('[data-auth-tab]').forEach(b=>b.classList.remove('active'));btn.classList.add('active');document.getElementById('signinForm').classList.toggle('hidden',btn.dataset.authTab!=='signin');document.getElementById('signupForm').classList.toggle('hidden',btn.dataset.authTab!=='signup');});
    document.getElementById('signinForm').onsubmit=signin; document.getElementById('signupForm').onsubmit=signup;
  }
  async function signin(ev){ev.preventDefault(); const f=new FormData(ev.target); const {error}=await sb.auth.signInWithPassword({email:f.get('email'),password:f.get('password')}); if(error) flash(error.message,'error');}
  async function signup(ev){ev.preventDefault(); const f=new FormData(ev.target); const {data,error}=await sb.auth.signUp({email:f.get('email'),password:f.get('password'),options:{data:{display_name:f.get('name'),requested_role:f.get('role')}}}); if(error) return flash(error.message,'error'); flash(data.session?'회원가입과 로그인이 완료되었습니다.':'가입 확인 이메일을 보냈습니다. 이메일 인증 후 로그인하세요.');}

  function navItem(view,label){return `<button class="${state.view===view?'active':''}" data-nav="${view}"><span class="nav-text">${label}</span></button>`}
  function renderShell(content){const p=state.profile;root.innerHTML=`<div class="shell"><aside class="side"><div class="brand"><i></i>원장</div><div class="side-user"><div class="avatar">${e(initials(p.display_name))}</div><b>${e(p.display_name)}</b><small>${p.role==='professor'?'교수':'학생'} · ${e(p.email)}</small></div><nav class="nav">${navItem('home','대시보드')}${p.role==='student'?navItem('teams','내 팀과 작업 계획'):navItem('courses','수업 및 프로젝트')}</nav><div class="side-bottom"><button id="signout">← 로그아웃</button></div></aside><main class="main"><div id="flash" class="notice hidden"></div>${content}</main></div>${renderModal()}`;document.querySelectorAll('[data-nav]').forEach(x=>x.onclick=()=>{state.view=x.dataset.nav;render();});document.getElementById('signout').onclick=()=>sb.auth.signOut();bindActions();}

  function renderHome(){
    const p=state.profile; const teamCount=state.teams.length; const tasks=state.tasks; const done=tasks.filter(t=>t.status==='done').length; const upcoming=[...tasks].filter(t=>t.due_date).sort((a,b)=>a.due_date.localeCompare(b.due_date)).slice(0,5);
    if(p.role==='professor') return `<div class="eyebrow">PROFESSOR WORKSPACE</div><h1 class="page-title">수업 및 팀 진행 현황</h1><p class="page-desc">수업을 만들고 프로젝트를 등록하면, 학생 팀의 작업 계획과 진행 상태를 확인할 수 있습니다.</p><div class="top-actions"><button class="btn gold" data-open="create-course">+ 수업 만들기</button></div><section class="grid3"><div class="card stat"><div class="label">COURSES</div><div class="value">${state.courses.length}</div><div class="sub">담당 수업</div></div><div class="card stat"><div class="label">PROJECTS</div><div class="value">${state.projects.length}</div><div class="sub">등록된 프로젝트</div></div><div class="card stat"><div class="label">TEAMS</div><div class="value">${teamCount}</div><div class="sub">학생 팀</div></div></section><section class="card" style="margin-top:20px"><div class="card-head"><h3>프로젝트별 팀 현황</h3><button class="btn sm" data-nav="courses">수업 관리 →</button></div>${renderProfessorProjectRows()}</section>`;
    return `<div class="eyebrow">STUDENT WORKSPACE</div><h1 class="page-title">내 팀의 작업 계획</h1><p class="page-desc">수업에 참가하고 팀에 합류한 뒤, 해야 할 일을 등록하여 진행 상태와 마감일을 공유하세요.</p><div class="top-actions"><button class="btn gold" data-open="join-course">+ 수업 참가</button><button class="btn" data-open="join-team">팀 참가 코드 입력</button></div><section class="grid3"><div class="card stat"><div class="label">MY TEAMS</div><div class="value">${teamCount}</div><div class="sub">참여 중인 팀</div></div><div class="card stat"><div class="label">TASKS</div><div class="value">${tasks.length}</div><div class="sub">내 팀 전체 작업</div></div><div class="card stat"><div class="label">DONE</div><div class="value">${done}</div><div class="sub">완료된 작업</div></div></section><section class="grid2" style="margin-top:20px"><div class="card"><div class="card-head"><h3>내 팀</h3><button class="btn sm" data-nav="teams">작업 계획 보기 →</button></div>${renderMyTeamRows()}</div><div class="card"><div class="card-head"><h3>다가오는 마감</h3></div>${upcoming.length?upcoming.map(t=>`<div class="listrow"><div class="grow"><div class="listtitle">${e(t.title)}</div><div class="listsub">${dateText(t.due_date)}</div></div><span class="badge ${e(t.priority)}">${priorityLabel(t.priority)}</span></div>`).join(''):'<div class="empty">등록된 마감 작업이 없습니다.</div>'}</div></section>`;
  }
  function renderProfessorProjectRows(){return state.projects.length?state.projects.map(pr=>{const teams=state.teams.filter(t=>t.project_id===pr.id);const ts=tasksForProject(pr.id);const done=ts.filter(t=>t.status==='done').length;const pct=ts.length?Math.round(done/ts.length*100):0;return `<div class="listrow"><div class="grow"><div class="listtitle">${e(pr.name)}</div><div class="listsub">${e(courseName(pr.course_id))} · 마감 ${dateText(pr.deadline)}</div></div><div style="width:150px"><div class="progress"><i style="width:${pct}%"></i></div><div class="listsub">작업 완료 ${done}/${ts.length}</div></div><div class="listsub">팀 ${teams.length}</div></div>`}).join(''):'<div class="empty">수업을 만들고 프로젝트를 등록하세요.</div>'}
  function renderMyTeamRows(){return state.teams.length?state.teams.map(t=>{const tasks=tasksForTeam(t.id);const done=tasks.filter(x=>x.status==='done').length;const pct=tasks.length?Math.round(done/tasks.length*100):0;return `<div class="listrow"><div class="avatar">${e(initials(t.name))}</div><div class="grow"><div class="listtitle">${e(t.name)}</div><div class="listsub">${e(projectName(t.project_id))} · 코드 ${e(t.join_code)}</div><div class="progress" style="margin-top:8px"><i style="width:${pct}%"></i></div></div><button class="btn sm" data-team="${t.id}">열기</button></div>`}).join(''):'<div class="empty">아직 참여 중인 팀이 없습니다.</div>'}

  function renderTeams(){if(!state.teams.length)return `<div class="eyebrow">TASK PLANNING</div><h1 class="page-title">내 팀과 작업 계획</h1><p class="page-desc">먼저 수업 참가 코드 또는 팀 참가 코드를 입력해 팀에 참여하세요.</p><div class="top-actions"><button class="btn gold" data-open="join-course">+ 수업 참가</button><button class="btn" data-open="join-team">팀 참가</button></div><div class="card empty">참여 중인 팀이 없습니다.</div>`; if(!state.activeTeamId||!activeTeam())state.activeTeamId=state.teams[0].id; const t=activeTeam();const pr=byId(state.projects,t.project_id);const members=state.members.filter(m=>m.team_id===t.id);const ts=tasksForTeam(t.id);const done=ts.filter(x=>x.status==='done').length;const pct=ts.length?Math.round(done/ts.length*100):0;
    return `<div class="eyebrow">TEAM TASK PLAN</div><h1 class="page-title">${e(t.name)}</h1><p class="page-desc">${e(pr?.name||'프로젝트')} · 팀 참가 코드 <span class="mono">${e(t.join_code)}</span> · 마감 ${dateText(pr?.deadline)}</p><div class="top-actions">${state.teams.map(x=>`<button class="btn sm ${x.id===t.id?'dark':''}" data-team="${x.id}">${e(x.name)}</button>`).join('')}<button class="btn gold" data-open="create-task">+ 작업 추가</button>${state.profile.role==='student'?`<button class="btn" data-open="create-team">새 팀 만들기</button>`:''}</div><section class="grid3" style="margin-bottom:20px"><div class="card stat"><div class="label">TASKS</div><div class="value">${ts.length}</div><div class="sub">전체 작업</div></div><div class="card stat"><div class="label">COMPLETE</div><div class="value">${pct}%</div><div class="sub">${done}/${ts.length} 완료</div></div><div class="card stat"><div class="label">MEMBERS</div><div class="value">${members.length}</div><div class="sub">${members.map(m=>e(m.profile?.display_name||'팀원')).join(', ')||'—'}</div></div></section><section class="board">${['todo','doing','done'].map(s=>renderColumn(s,ts,members)).join('')}</section>`}
  function renderColumn(status,tasks,members){const labels={todo:'할 일',doing:'진행 중',done:'완료'};return `<div class="column"><div class="column-head"><span>${labels[status]}</span><span class="badge ${status}">${tasks.filter(t=>t.status===status).length}</span></div>${tasks.filter(t=>t.status===status).map(t=>renderTask(t,members)).join('')||'<div class="empty">작업 없음</div>'}</div>`}
  function renderTask(t,members){const assignee=members.find(m=>m.user_id===t.assignee_id)?.profile?.display_name||'담당자 없음';return `<article class="task"><div class="task-title">${e(t.title)}</div>${t.description?`<div class="muted" style="font-size:12px;margin-top:5px;line-height:1.5">${e(t.description)}</div>`:''}<div class="task-meta"><span class="badge ${e(t.priority)}">${priorityLabel(t.priority)}</span><span class="badge ${e(t.status)}">${statusLabel(t.status)}</span></div><div class="task-foot"><span>${e(assignee)}</span><span>${dateText(t.due_date)}</span></div>${state.profile.role==='student'?`<div class="task-actions"><button class="btn" data-move="${t.id}|todo">할 일</button><button class="btn" data-move="${t.id}|doing">진행</button><button class="btn" data-move="${t.id}|done">완료</button><button class="btn danger" data-delete-task="${t.id}">삭제</button></div>`:''}</article>`}

  function renderCourses(){const c=state.courses;return `<div class="eyebrow">COURSE MANAGEMENT</div><h1 class="page-title">수업 및 프로젝트</h1><p class="page-desc">수업을 만든 뒤 프로젝트와 마감일을 등록하세요. 학생에게 수업 참가 코드를 안내하면 학생이 팀을 구성할 수 있습니다.</p><div class="top-actions"><button class="btn gold" data-open="create-course">+ 수업 만들기</button></div>${c.length?c.map(course=>{const projects=state.projects.filter(p=>p.course_id===course.id);return `<section class="card" style="margin-bottom:16px"><div class="card-head"><div><h3>${e(course.name)} <span class="eyebrow">${e(course.code)} · ${e(course.term)}</span></h3><div class="listsub">학생 수업 참가 코드: <b>${e(course.join_code)}</b></div></div><button class="btn sm gold" data-open="create-project" data-course="${course.id}">+ 프로젝트</button></div>${projects.length?projects.map(pr=>{const teams=state.teams.filter(t=>t.project_id===pr.id);return `<div class="listrow"><div class="grow"><div class="listtitle">${e(pr.name)}</div><div class="listsub">마감 ${dateText(pr.deadline)} · ${e(pr.description||'설명 없음')}</div></div><span class="badge todo">팀 ${teams.length}</span></div>`}).join(''):'<div class="empty">프로젝트를 등록하세요.</div>'}</section>`}).join(''):'<div class="card empty">아직 만든 수업이 없습니다.</div>'}`}

  function courseName(id){return byId(state.courses,id)?.name||'수업'} function projectName(id){return byId(state.projects,id)?.name||'프로젝트'} function tasksForTeam(id){return state.tasks.filter(t=>t.team_id===id)} function tasksForProject(id){return state.tasks.filter(t=>state.teams.find(x=>x.id===t.team_id)?.project_id===id)}
  function statusLabel(v){return ({todo:'할 일',doing:'진행 중',done:'완료'})[v]||v} function priorityLabel(v){return ({low:'낮음',medium:'보통',high:'높음'})[v]||v}

  function renderModal(){if(!state.modal)return ''; const type=state.modal.type;let title='',body='',footer='';
    if(type==='join-course'){title='수업 참가';body=`<form id="joinCourseForm"><div class="field"><label>수업 참가 코드</label><input name="code" required maxlength="10" placeholder="예: ABC123" style="text-transform:uppercase"></div><button class="btn dark full">참가하기</button></form>`}
    if(type==='join-team'){title='팀 참가';body=`<form id="joinTeamForm"><div class="field"><label>팀 참가 코드</label><input name="code" required maxlength="10" placeholder="예: ABC123" style="text-transform:uppercase"></div><div class="field"><label>내 역할</label><input name="memberRole" maxlength="60" placeholder="예: 프론트엔드"></div><button class="btn dark full">팀 참가</button></form>`}
    if(type==='create-course'){title='수업 만들기';body=`<form id="createCourseForm"><div class="row"><div class="field"><label>수업명</label><input name="name" required maxlength="100" placeholder="예: 캡스톤디자인"></div><div class="field"><label>수업 코드</label><input name="code" required maxlength="30" placeholder="CS401"></div></div><div class="field"><label>학기</label><input name="term" required maxlength="50" placeholder="2026-2학기"></div><button class="btn dark full">수업 등록</button></form>`}
    if(type==='create-project'){title='프로젝트 등록';body=`<form id="createProjectForm"><input type="hidden" name="courseId" value="${e(state.modal.courseId)}"><div class="field"><label>프로젝트명</label><input name="name" required maxlength="140" placeholder="예: 기말 팀 프로젝트"></div><div class="field"><label>설명</label><textarea name="description" placeholder="프로젝트 목적, 산출물, 기준을 적으세요."></textarea></div><div class="field"><label>최종 마감일</label><input type="date" name="deadline"></div><button class="btn dark full">프로젝트 등록</button></form>`}
    if(type==='create-team'){title='새 팀 만들기';const myProjects=state.projects;body=`<form id="createTeamForm"><div class="field"><label>프로젝트</label><select name="projectId" required>${myProjects.map(p=>`<option value="${p.id}">${e(courseName(p.course_id))} · ${e(p.name)}</option>`).join('')}</select></div><div class="field"><label>팀 이름</label><input name="name" required maxlength="80" placeholder="예: 팀 알파"></div><div class="field"><label>내 역할</label><input name="memberRole" maxlength="60" value="팀장"></div><button class="btn dark full">팀 생성</button></form>`}
    if(type==='create-task'){title='작업 계획 추가';const team=activeTeam();const members=state.members.filter(m=>m.team_id===team?.id);body=`<form id="createTaskForm"><div class="field"><label>작업명</label><input name="title" required maxlength="160" placeholder="예: 로그인 화면 구현"></div><div class="field"><label>세부 내용</label><textarea name="description" placeholder="완료 기준, 참고 링크, 산출물 등을 적으세요."></textarea></div><div class="row"><div class="field"><label>담당자</label><select name="assigneeId"><option value="">미지정</option>${members.map(m=>`<option value="${m.user_id}">${e(m.profile?.display_name||'팀원')}</option>`).join('')}</select></div><div class="field"><label>마감일</label><input type="date" name="dueDate"></div></div><div class="row"><div class="field"><label>상태</label><select name="status"><option value="todo">할 일</option><option value="doing">진행 중</option><option value="done">완료</option></select></div><div class="field"><label>우선순위</label><select name="priority"><option value="low">낮음</option><option value="medium" selected>보통</option><option value="high">높음</option></select></div></div><button class="btn dark full">작업 등록</button></form>`}
    return `<div class="modal-bg" id="modalBg"><div class="modal"><div class="modal-head"><h3>${title}</h3><button id="closeModal">×</button></div><div class="modal-body">${body}</div></div></div>`;
  }

  function bindActions(){document.querySelectorAll('[data-open]').forEach(b=>b.onclick=()=>setModal(b.dataset.open,{courseId:b.dataset.course||null}));document.querySelectorAll('[data-team]').forEach(b=>b.onclick=()=>{state.activeTeamId=b.dataset.team;state.view='teams';render();});document.querySelectorAll('[data-move]').forEach(b=>b.onclick=()=>{const [id,status]=b.dataset.move.split('|');moveTask(id,status)});document.querySelectorAll('[data-delete-task]').forEach(b=>b.onclick=()=>deleteTask(b.dataset.deleteTask));if(document.getElementById('closeModal'))document.getElementById('closeModal').onclick=closeModal; if(document.getElementById('modalBg'))document.getElementById('modalBg').onclick=(ev)=>{if(ev.target.id==='modalBg')closeModal()};
    const forms={joinCourseForm:joinCourse,joinTeamForm:joinTeam,createCourseForm:createCourse,createProjectForm:createProject,createTeamForm:createTeam,createTaskForm:createTask};Object.entries(forms).forEach(([id,fn])=>{const x=document.getElementById(id);if(x)x.onsubmit=fn});}

  async function joinCourse(ev){ev.preventDefault();const f=new FormData(ev.target);const {error}=await sb.rpc('join_course_by_code',{input_code:f.get('code')});if(error)return flash(error.message,'error');closeModal();await loadData();flash('수업에 참가했습니다.');}
  async function joinTeam(ev){ev.preventDefault();const f=new FormData(ev.target);const {data,error}=await sb.rpc('join_team_by_code',{input_code:f.get('code'),input_role:f.get('memberRole')});if(error)return flash(error.message,'error');closeModal();await loadData();state.activeTeamId=data?.id||state.activeTeamId;state.view='teams';flash('팀에 참가했습니다.');render();}
  async function createCourse(ev){ev.preventDefault();const f=new FormData(ev.target);const {error}=await sb.from('courses').insert({professor_id:state.profile.id,name:f.get('name'),code:f.get('code'),term:f.get('term')});if(error)return flash(error.message,'error');closeModal();await loadData();flash('수업을 만들었습니다.');}
  async function createProject(ev){ev.preventDefault();const f=new FormData(ev.target);const {error}=await sb.from('projects').insert({course_id:f.get('courseId'),name:f.get('name'),description:f.get('description')||'',deadline:f.get('deadline')||null});if(error)return flash(error.message,'error');closeModal();await loadData();flash('프로젝트를 등록했습니다.');}
  async function createTeam(ev){ev.preventDefault();const f=new FormData(ev.target);const {data,error}=await sb.rpc('create_team_with_leader',{input_project:f.get('projectId'),input_name:f.get('name'),input_role:f.get('memberRole')});if(error)return flash(error.message,'error');closeModal();await loadData();state.activeTeamId=data?.id;state.view='teams';flash('팀을 만들었습니다. 팀 코드를 공유하세요.');render();}
  async function createTask(ev){ev.preventDefault();const f=new FormData(ev.target);const {error}=await sb.from('tasks').insert({team_id:state.activeTeamId,title:f.get('title'),description:f.get('description')||'',assignee_id:f.get('assigneeId')||null,due_date:f.get('dueDate')||null,status:f.get('status'),priority:f.get('priority'),created_by:state.profile.id});if(error)return flash(error.message,'error');closeModal();await loadData();flash('작업 계획을 등록했습니다.');}
  async function moveTask(id,status){const {error}=await sb.from('tasks').update({status}).eq('id',id);if(error)return flash(error.message,'error');await loadData();flash('작업 상태를 변경했습니다.');}
  async function deleteTask(id){if(!confirm('이 작업을 삭제할까요?'))return;const {error}=await sb.from('tasks').delete().eq('id',id);if(error)return flash(error.message,'error');await loadData();flash('작업을 삭제했습니다.');}

  async function loadData(){if(!state.session)return;const id=state.session.user.id;const {data:profile,error:pErr}=await sb.from('profiles').select('*').eq('id',id).single();if(pErr){console.error(pErr);return;}state.profile=profile;
    const {data:courses,error:cErr}=await sb.from('courses').select('*').order('created_at',{ascending:false}); if(cErr)console.error(cErr); state.courses=courses||[];
    const {data:projects,error:prErr}=await sb.from('projects').select('*').order('created_at',{ascending:false});if(prErr)console.error(prErr);state.projects=projects||[];
    const {data:teams,error:tErr}=await sb.from('teams').select('*').order('created_at',{ascending:false});if(tErr)console.error(tErr);state.teams=teams||[];
    const teamIds=state.teams.map(t=>t.id); if(!teamIds.length){state.members=[];state.tasks=[];return render();}
    const {data:members,error:mErr}=await sb.from('team_members').select('team_id,user_id,member_role,profiles:user_id(id,display_name,email)').in('team_id',teamIds);if(mErr)console.error(mErr);state.members=(members||[]).map(m=>({...m,profile:m.profiles}));
    const {data:tasks,error:taErr}=await sb.from('tasks').select('*').in('team_id',teamIds).order('due_date',{ascending:true,nullsFirst:false});if(taErr)console.error(taErr);state.tasks=tasks||[];render();}

  function render(){if(!state.session)return renderAuth(); const content=state.view==='home'?renderHome():state.view==='teams'?renderTeams():renderCourses();renderShell(content)}
  async function boot(){if(!isConfigured()){root.innerHTML=`<div class="auth"><main class="auth-pane"><div class="auth-card"><h1>연결 설정이 필요합니다</h1><p><code>config.js</code>에 Supabase URL과 anon key를 넣어야 로그인과 데이터 저장이 동작합니다.</p><div class="notice">이 파일은 화면만 배포된 상태입니다. README의 Supabase 설정 절차를 먼저 완료하세요.</div></div></main></div>`;return;}sb=createClient(cfg.SUPABASE_URL,cfg.SUPABASE_ANON_KEY);const {data:{session}}=await sb.auth.getSession();state.session=session;sb.auth.onAuthStateChange(async(_event,session)=>{state.session=session;if(session) await loadData(); else {state.profile=null;state.courses=[];state.projects=[];state.teams=[];state.tasks=[];render();}});if(session)await loadData();else render();}
  const root=document.getElementById('root');boot();
  </script>
</body>
</html>
